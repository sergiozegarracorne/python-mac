- regex: nis
  examples: |
    - \b[0-9]{7}\b

- regex: medidor
  examples: |
    - \b[A-Za-z]{2}[0-9]{9}\b
    - \b[A-Za-z][0-9]{10}\b

- synonym: nis
  examples: |
    - suministro
    - numero de suministro

- synonym: medidor
  examples: |
    - numero de medidor
    - numero de serie del medidor
